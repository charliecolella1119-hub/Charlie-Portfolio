<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hydrogen Orbital WebGL Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="controls">
    <h2>Hydrogen WebGL Demo</h2>

    <label>n: <span id="nValue">4</span></label>
    <input id="nSlider" type="range" min="1" max="5" value="4" />

    <label>l: <span id="lValue">3</span></label>
    <input id="lSlider" type="range" min="0" max="3" value="3" />

    <label>m: <span id="mValue">0</span></label>
    <input id="mSlider" type="range" min="-3" max="3" value="0" />

    <button id="regenerate">Regenerate Orbital</button>

    <label>Particle Size: <span id="sizeValue">0.045</span></label>
    <input id="sizeSlider" type="range" min="0.01" max="0.08" step="0.005" value="0.045" />

    <label>Opacity: <span id="opacityValue">0.55</span></label>
    <input id="opacitySlider" type="range" min="0.2" max="1.0" step="0.05" value="0.55" />

    <label>Color Map</label>
    <select id="colorMapSelect">
        <option value="gold">Gold</option>
        <option value="viridis">Viridis</option>
        <option value="heatmap">Heat Map</option>
    </select>

<a href="../index.html" class="back-button">← Back to Portfolio</a>

    <p>
      Simplified browser-based hydrogen orbital viewer.
    </p>
  </div>

  <canvas id="canvas"></canvas>

  <script type="importmap">
    {
        "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

  <script type="module" src="sim.js"></script>
</body>
</html>
